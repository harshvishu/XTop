name: Build and Release macOS App

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, release, 'release/**']
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    if: ${{ !(startsWith(github.ref, 'refs/tags/v') && github.actor == 'github-actions[bot]') }}
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode 16
        run: |
          developer_dir=$(find /Applications -maxdepth 1 -type d -name 'Xcode_16*.app' | sort -V | tail -n 1)/Contents/Developer
          if [[ ! -d "$developer_dir" ]]; then
            echo "Unable to locate an installed Xcode 16 toolchain on the runner."
            ls -1 /Applications | grep '^Xcode' || true
            exit 1
          fi
          echo "DEVELOPER_DIR=$developer_dir" >> "$GITHUB_ENV"

      - name: Show toolchain info
        run: |
          xcodebuild -version
          sw_vers

      - name: Determine version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
            echo "ARTIFACT_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
            echo "SHOULD_RELEASE=true" >> "$GITHUB_ENV"
          elif [[ "${GITHUB_REF}" == refs/heads/release || "${GITHUB_REF}" == refs/heads/release/* ]]; then
            latest_tag=$(git tag -l 'v*' --sort=-v:refname | head -n 1)

            if [[ -z "$latest_tag" ]]; then
              next_tag="v0.0.1"
            else
              version_core="${latest_tag#v}"
              IFS='.' read -r major minor patch <<< "$version_core"

              if [[ -z "${major:-}" || -z "${minor:-}" || -z "${patch:-}" ]]; then
                echo "Unexpected latest tag format: $latest_tag" >&2
                exit 1
              fi

              next_patch=$((patch + 1))
              next_tag="v${major}.${minor}.${next_patch}"
            fi

            next_version="${next_tag#v}"
            echo "APP_VERSION=${next_version}" >> "$GITHUB_ENV"
            echo "ARTIFACT_VERSION=${next_version}" >> "$GITHUB_ENV"
            echo "RELEASE_TAG=${next_tag}" >> "$GITHUB_ENV"
            echo "SHOULD_RELEASE=true" >> "$GITHUB_ENV"
          else
            # Keep MARKETING_VERSION Xcode-compatible on branch/PR builds.
            echo "APP_VERSION=0.0.0" >> "$GITHUB_ENV"
            echo "ARTIFACT_VERSION=0.0.0-${GITHUB_SHA::7}" >> "$GITHUB_ENV"
            echo "SHOULD_RELEASE=false" >> "$GITHUB_ENV"
          fi

      - name: Build app
        run: |
          xcodebuild \
            -project XTop.xcodeproj \
            -scheme XTop \
            -configuration Release \
            -derivedDataPath build \
            -destination "generic/platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            MARKETING_VERSION="${APP_VERSION}" \
            CURRENT_PROJECT_VERSION="${GITHUB_RUN_NUMBER}" \
            build

      - name: Package artifacts
        run: |
          chmod +x script/package_app.sh
          script/package_app.sh build/Build/Products/Release/XTop.app "${ARTIFACT_VERSION}" out

      - name: Generate checksums
        run: |
          cd out
          shasum -a 256 XTop-*.dmg XTop-*.zip > SHA256SUMS.txt

      - name: Create release tag
        if: github.event_name == 'push' && (github.ref == 'refs/heads/release' || startsWith(github.ref, 'refs/heads/release/'))
        run: |
          if git ls-remote --tags origin "refs/tags/${RELEASE_TAG}" | grep -q "${RELEASE_TAG}"; then
            echo "Tag ${RELEASE_TAG} already exists on origin."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "${RELEASE_TAG}" -m "Release ${RELEASE_TAG}"
          git push origin "refs/tags/${RELEASE_TAG}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: XTop-${{ env.ARTIFACT_VERSION }}
          path: out/*
          retention-days: 14

      - name: Build release notes
        if: env.SHOULD_RELEASE == 'true'
        run: |
          {
            echo "## Downloads"
            echo
            echo "- XTop-${ARTIFACT_VERSION}.dmg"
            echo "- XTop-${ARTIFACT_VERSION}.zip"
            echo
            echo "## Install"
            echo
            echo "1. Download the DMG and drag XTop.app into Applications."
            echo "2. On first launch, right-click XTop.app and choose Open."
            echo "3. If macOS still blocks launch, run: xattr -dr com.apple.quarantine /Applications/XTop.app"
            echo
            echo "This build is ad-hoc signed and not notarized."
            echo
            echo "## SHA-256"
            cat out/SHA256SUMS.txt
          } > out/RELEASE_NOTES.md

      - name: Create GitHub Release
        if: env.SHOULD_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          files: out/*
          body_path: out/RELEASE_NOTES.md
